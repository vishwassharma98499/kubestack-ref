name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Terraform Validation ───────────────────────
  terraform:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Format Check
        run: terraform fmt -check -recursive terraform/

      - name: Validate Modules
        run: |
          for dir in terraform/modules/*/; do
            echo "==> Validating ${dir}"
            cd "${dir}"
            terraform init -backend=false -input=false > /dev/null
            terraform validate
            cd - > /dev/null
          done

  # ── Kubernetes Manifest Validation ─────────────
  kubernetes:
    name: Kubernetes Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz"
          tar xzf kubeconform.tar.gz && sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          find kubernetes/ -name '*.yaml' -not -path '*/grafana-dashboards/*' -print0 | \
            xargs -0 kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.29.0 -summary

  # ── Security Scanning ──────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true

      - name: Run Trivy (Terraform)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Run Trivy (Kubernetes)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: config
          scan-ref: kubernetes/
          severity: "CRITICAL,HIGH"
          exit-code: "0"

  # ── Docker Build Test ──────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sample-api image
        run: docker build -t kubestack-ref/sample-api:ci ./app/

      - name: Smoke test container
        run: |
          docker run -d --name test-api -p 8080:8080 kubestack-ref/sample-api:ci
          sleep 3
          curl -sf http://localhost:8080/healthz | jq .
          curl -sf http://localhost:8080/info | jq .
          docker stop test-api

  # ── Integration Test (K3d) ─────────────────────
  integration:
    name: Integration Test (K3d)
    runs-on: ubuntu-latest
    needs: [terraform, kubernetes, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Install k3d
        run: curl -sL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.3 bash

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Create cluster & deploy
        run: |
          # Create minimal cluster (no monitoring to save CI time)
          k3d cluster create ci-test --servers 1 --agents 1 \
            --k3s-arg "--disable=traefik@server:0" --wait --timeout 120s

          # Build and import image
          docker build -t kubestack-ref/sample-api:local ./app/
          k3d image import kubestack-ref/sample-api:local -c ci-test

          # Deploy
          kubectl apply -f kubernetes/base/namespace.yaml
          kubectl apply -f kubernetes/apps/sample-api/

          # Wait and verify
          kubectl wait --for=condition=available deployment/sample-api -n app --timeout=120s
          kubectl run curl-test --image=curlimages/curl --restart=Never -n app -- curl -sf http://sample-api.app.svc:8080/healthz
          kubectl wait --for=condition=Ready pod/curl-test -n app --timeout=30s
          kubectl logs curl-test -n app | jq .
          kubectl delete pod curl-test -n app
          kubectl run curl-test2 --image=curlimages/curl --restart=Never -n app -- curl -sf http://sample-api.app.svc:8080/info
          kubectl wait --for=condition=Ready pod/curl-test2 -n app --timeout=30s
          kubectl logs curl-test2 -n app | jq .
          kubectl delete pod curl-test2 -n app

      - name: Show cluster state
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -n app --sort-by=.metadata.creationTimestamp | tail -20

      - name: Cleanup
        if: always()
        run: k3d cluster delete ci-test
