apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedrepos
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedRepos
      validation:
        openAPIV3Schema:
          type: object
          properties:
            repos:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sallowedrepos

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not image_matches(container.image, input.parameters.repos)
          msg := sprintf("Container %v uses image %v which is not from an allowed registry. Allowed: %v", [container.name, container.image, input.parameters.repos])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          not image_matches(container.image, input.parameters.repos)
          msg := sprintf("Init container %v uses image %v which is not from an allowed registry. Allowed: %v", [container.name, container.image, input.parameters.repos])
        }

        image_matches(image, repos) {
          repo := repos[_]
          startswith(image, repo)
        }
---
# Only allow images from our ECR and essential public registries
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAllowedRepos
metadata:
  name: allowed-repos
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - gatekeeper-system
      - argocd
      - monitoring
      - cert-manager
      - sealed-secrets
      - ingress
      - logging
      - kubecost
  parameters:
    repos:
      # Our ECR — replace ACCOUNT_ID with actual account
      - "ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/kubestack-ref/"
      # AWS public ECR for EKS add-ons
      - "602401143452.dkr.ecr.eu-central-1.amazonaws.com/"
      - "public.ecr.aws/"
