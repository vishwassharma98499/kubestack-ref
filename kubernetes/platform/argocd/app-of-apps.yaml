apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  labels:
    app: app-of-apps
    team: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # For local K3d demo, we use the path-based approach.
    # ArgoCD reads manifests from this directory, which contains
    # individual Application CRs for each managed component.
    repoURL: https://github.com/vishwassharma98499/kubestack-ref.git
    targetRevision: HEAD
    path: kubernetes/platform/argocd/apps
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
