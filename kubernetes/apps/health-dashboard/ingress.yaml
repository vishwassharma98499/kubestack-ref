apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: health-dashboard
  namespace: app
  labels:
    app: health-dashboard
    team: platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: dashboard.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: health-dashboard
                port:
                  number: 80
