<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kubestack-ref — Health Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.1);
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.1);
            --yellow: #eab308;
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .header p {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--blue); }
        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-healthy {
            background: var(--green-bg);
            color: var(--green);
        }
        .status-error {
            background: var(--red-bg);
            color: var(--red);
        }
        .status-loading {
            background: var(--blue-bg);
            color: var(--blue);
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-green { background: var(--green); }
        .dot-red { background: var(--red); }
        .dot-blue { background: var(--blue); animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .info-item {
            background: var(--bg);
            padding: 0.75rem;
            border-radius: 8px;
        }
        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .refresh-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .refresh-bar button {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .refresh-bar button:hover {
            background: var(--surface-hover);
        }
        .endpoints-list {
            margin-top: 1rem;
        }
        .endpoint-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0;
            border-bottom: 1px solid var(--border);
        }
        .endpoint-row:last-child { border-bottom: none; }
        .endpoint-name {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.875rem;
        }
        .endpoint-latency {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .error-text {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .footer a { color: var(--blue); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>kubestack-ref</h1>
        <p>Health Dashboard — real-time service status</p>
    </div>

    <div class="grid">
        <!-- Health Status Card -->
        <div class="card">
            <div class="card-title">Service Health</div>
            <div id="health-status">
                <span class="status-badge status-loading">
                    <span class="dot dot-blue"></span>
                    Checking...
                </span>
            </div>
            <div class="endpoints-list" id="endpoints-list">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- App Info Card -->
        <div class="card">
            <div class="card-title">Application Info</div>
            <div id="info-status">
                <span class="status-badge status-loading">
                    <span class="dot dot-blue"></span>
                    Loading...
                </span>
            </div>
            <div class="info-grid" id="info-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Metrics Card -->
        <div class="card">
            <div class="card-title">Uptime Monitor</div>
            <div id="uptime-content">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Checks</div>
                        <div class="info-value" id="check-count">0</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Success Rate</div>
                        <div class="info-value" id="success-rate">—</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Avg Latency</div>
                        <div class="info-value" id="avg-latency">—</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Last Check</div>
                        <div class="info-value" id="last-check">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="refresh-bar">
        <span>Auto-refreshing every 5 seconds</span>
        <button onclick="checkAll()">Refresh Now</button>
    </div>

    <div class="footer">
        <p>kubestack-ref — Production-grade K8s + Terraform reference architecture</p>
        <p><a href="https://github.com/vishwassharma98499/kubestack-ref">GitHub</a></p>
    </div>

    <script>
        // Configuration — the API is available via the Kubernetes service DNS
        // When accessed via ingress, use relative paths; when port-forwarded, use localhost
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:8080'
            : '/api';

        // For in-cluster use, we'll try the service DNS name directly
        // The nginx proxy_pass in the nginx config handles this
        const ENDPOINTS = [
            { path: '/healthz', name: '/healthz' },
            { path: '/info', name: '/info' },
            { path: '/', name: '/' },
        ];

        let stats = {
            checks: 0,
            successes: 0,
            totalLatency: 0,
        };

        async function fetchEndpoint(path) {
            const start = performance.now();
            try {
                const response = await fetch(`${API_BASE}${path}`, {
                    signal: AbortSignal.timeout(5000),
                });
                const latency = Math.round(performance.now() - start);
                const data = await response.json();
                return { ok: response.ok, status: response.status, latency, data };
            } catch (err) {
                const latency = Math.round(performance.now() - start);
                return { ok: false, status: 0, latency, error: err.message };
            }
        }

        function renderHealthStatus(results) {
            const container = document.getElementById('health-status');
            const allHealthy = results.every(r => r.ok);

            if (allHealthy) {
                container.innerHTML = `
                    <span class="status-badge status-healthy">
                        <span class="dot dot-green"></span>
                        All Systems Operational
                    </span>`;
            } else {
                container.innerHTML = `
                    <span class="status-badge status-error">
                        <span class="dot dot-red"></span>
                        Degraded
                    </span>`;
            }
        }

        function renderEndpoints(results) {
            const list = document.getElementById('endpoints-list');
            list.innerHTML = results.map((r, i) => `
                <div class="endpoint-row">
                    <div>
                        <span class="dot ${r.ok ? 'dot-green' : 'dot-red'}" style="margin-right:8px"></span>
                        <span class="endpoint-name">${ENDPOINTS[i].name}</span>
                    </div>
                    <span class="endpoint-latency">${r.ok ? r.latency + 'ms' : 'Error'}</span>
                </div>
            `).join('');
        }

        function renderInfo(data) {
            const status = document.getElementById('info-status');
            const grid = document.getElementById('info-grid');

            if (!data) {
                status.innerHTML = `
                    <span class="status-badge status-error">
                        <span class="dot dot-red"></span>
                        Unavailable
                    </span>`;
                grid.innerHTML = '';
                return;
            }

            status.innerHTML = '';
            const fields = [
                { label: 'Version', value: data.version || '—' },
                { label: 'Environment', value: data.environment || '—' },
                { label: 'Go Version', value: data.go_version || '—' },
                { label: 'Build Time', value: data.build_time || '—' },
                { label: 'Log Level', value: data.log_level || '—' },
                { label: 'Goroutines', value: data.goroutines || '—' },
            ];

            grid.innerHTML = fields.map(f => `
                <div class="info-item">
                    <div class="info-label">${f.label}</div>
                    <div class="info-value">${f.value}</div>
                </div>
            `).join('');
        }

        function updateStats(results) {
            stats.checks++;
            const allOk = results.every(r => r.ok);
            if (allOk) stats.successes++;
            const avgLatency = results.reduce((sum, r) => sum + r.latency, 0) / results.length;
            stats.totalLatency += avgLatency;

            document.getElementById('check-count').textContent = stats.checks;
            document.getElementById('success-rate').textContent =
                Math.round((stats.successes / stats.checks) * 100) + '%';
            document.getElementById('avg-latency').textContent =
                Math.round(stats.totalLatency / stats.checks) + 'ms';
            document.getElementById('last-check').textContent =
                new Date().toLocaleTimeString();
        }

        async function checkAll() {
            const results = await Promise.all(ENDPOINTS.map(e => fetchEndpoint(e.path)));
            renderHealthStatus(results);
            renderEndpoints(results);

            // Find the /info result and render its data
            const infoResult = results.find((_, i) => ENDPOINTS[i].path === '/info');
            renderInfo(infoResult && infoResult.ok ? infoResult.data : null);

            updateStats(results);
        }

        // Initial check + auto-refresh
        checkAll();
        setInterval(checkAll, 5000);
    </script>
</body>
</html>
