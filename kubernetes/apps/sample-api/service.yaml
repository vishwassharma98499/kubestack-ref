apiVersion: v1
kind: Service
metadata:
  name: sample-api
  namespace: app
  labels:
    app: sample-api
    team: platform
spec:
  type: ClusterIP
  selector:
    app: sample-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
