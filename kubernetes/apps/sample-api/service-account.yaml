apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-api
  namespace: app
  labels:
    app: sample-api
    team: platform
  annotations:
    # In production (AWS EKS), this would have the IRSA annotation:
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/kubestack-ref-dev-app-irsa
    kubestack-ref.io/description: "Service account for the sample-api workload"
